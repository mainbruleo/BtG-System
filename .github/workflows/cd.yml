name: CD - Build Executable

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: windows-latest  # Geramos o .exe no Windows para garantir compatibilidade
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed BtGSys.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BtG-System-Executable
          path: dist/*.exe