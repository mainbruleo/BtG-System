name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t btgsys-app:test .
      
      - name: Verify Environment
        run: |
          # Verifica se as bibliotecas principais carregam sem erros de importação
          docker run --rm btgsys-app:test python -c "import tkinter; import PIL; import docx; print('Ambiente validado com sucesso!')"

    discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Discord Webhook
        uses: johnnyhuy/actions-discord-git-webhook@main
        uses: Sniddl/discord-commits@v1.8
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-extras: true 